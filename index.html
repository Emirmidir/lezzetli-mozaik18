<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Explorer Grid Template</title>

<script>
const data = JSON.parse(localStorage.getItem("siteSettings"));
const favicon = localStorage.getItem("siteFavicon");

// APPLY SETTINGS
if (data) {

  if (data.tabName) document.title = data.tabName;

  if (data.bg)
    document.body.style.backgroundImage = "url('" + data.bg + "')";

  if (data.textColor)
    document.body.style.color = data.textColor;

  if (data.fontSize)
    document.body.style.fontSize = data.fontSize + "px";

  if (data.btnColor) {
    document.querySelectorAll("button").forEach(btn => {
      btn.style.background = data.btnColor;
    });
  }

  if (data.panelOpacity) {
    document.querySelectorAll(".panel").forEach(p => {
      p.style.background = "rgba(0,0,0," + data.panelOpacity + ")";
    });
  }

  if (data.darkMode === "off") {
    document.body.style.filter = "invert(1) hue-rotate(180deg)";
  }

  // iframe (you said don't change logic → just apply height)
  if (data.iframeHeight) {
    document.querySelectorAll("iframe").forEach(f => {
      f.style.height = data.iframeHeight;
    });
  }
}

// APPLY FAVICON
if (favicon) {
  let link = document.querySelector("link[rel~='icon']");
  if (!link) {
    link = document.createElement("link");
    link.rel = "icon";
    document.head.appendChild(link);
  }
  link.href = favicon;
}
</script>


<!-- FONT -->

<style>
/* ===== RESET ===== */
html, body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  font-family: "Inter", Helvetica, Roboto;
  color: white;
  background-color: #000;
}

/* ===== BACKGROUND ===== */
body {
  background-image: url("https://www.iclarified.com/images/news/86400/417638/417638-1280.avif");
  background-attachment: fixed;
  background-size: cover;
  background-position: center;
}

/* ===== PANEL STYLE ===== */
.panel {
  background: rgba(0,0,0,0.75);
  border-radius: 11px;
  margin: 1rem;
  padding: 1rem;
}

/* ===== HEADER ===== */
header {
  font-size: 24px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  justify-content: space-between;
}

/* ===== DIRECTORY BAR ===== */
.directory {
  display: flex;
  gap: 1rem;
  overflow-x: auto;
  overflow-y: hidden;
  white-space: nowrap;
  flex-wrap: nowrap;
}

.dir-item {
  display: inline-block;
  color: #00f7ff;
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
}

.dir-item:hover {
  transform: translate(3px, -3px);
  transition: transform 0.2s;
}

/* ===== MAIN AREA ===== */
.main {
  display: flex;
  gap: 1rem;
  margin: 0 1rem;
  flex-wrap: wrap;
}

/* ===== CONTENT PANEL WITH GRID ===== */
.content {
  flex: 1 1 60%;
  min-width: 300px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  grid-auto-rows: minmax(150px, auto);
  gap: 1rem;
}

/* ===== BLOCKS INSIDE CONTENT ===== */
.content-block {
  background: rgba(20,20,20,0.85);
  border-radius: 11px;
  padding: 0.5rem;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: stretch;
}

/* ===== RIGHT PANEL ===== */
.right-panel {
  flex: 1 1 25%;
  min-width: 200px;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

/* ===== BUTTONS ===== */
button {
  background: #111;
  color: white;
  border: 1px solid #333;
  padding: 0.5rem;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
}

button:hover {
  background: #222;
}

/* ===== BOTTOM BAR ===== */
.bottom-bar {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin: 1rem;
}

/* ===== IFRAME, IMAGES, EMBEDS ===== */
iframe, img, object, embed, video {
  border-radius: 11px;
  border: 0;
  width: 100%;
  height: 200px;
  max-height: 300px;
  background: #000;
  object-fit: contain;
}

/* ===== SCROLLBAR STYLE ===== */
::-webkit-scrollbar {
  height: 8px;
  width: 8px;
}

::-webkit-scrollbar-thumb {
  background: #333;
  border-radius: 10px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .main {
    flex-direction: column;
  }
  .content, .right-panel {
    flex: 1 1 100%;
    min-width: unset;
  }
  iframe, img, object, embed, video {
    height: 250px;
  }
}
</style>
</head>

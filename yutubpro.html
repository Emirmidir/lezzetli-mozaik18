<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fullscreen Iframe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* Remove default margins and ensure full height */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* Make iframe fill entire viewport */
    iframe {
      display: block;
      border: none;
      width: 100vw;
      height: 100vh;
    }

      padding:12px;

    }
  </style>
</head>
<body>

</body>
</html>

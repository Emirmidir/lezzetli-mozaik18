
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ayarlar Paneli</title>

<!-- YOUR CSS (UNCHANGED) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" rel="stylesheet">

<style>

/* ===== RESET (FIXES WHITE EDGES) ===== */
html, body {
  margin: 0;
  padding: 0;
  background-color: #000;
  min-height: 100vh;
  font-family: "Inter", Helvetica, Roboto;
  color: white;
}

/* ===== BACKGROUND ===== */
body {
  background-image: url("https://www.iclarified.com/images/news/86400/417638/417638-1280.avif");
  background-attachment: fixed;
  background-size: cover;
  background-position: center;
  background-repeat:repeat-y;
}

/* ===== REUSABLE PANEL STYLE ===== */
.panel {
  background: rgba(0, 0, 0, 0.75);
  border-radius: 11px;
  margin: 1rem;
  padding: 1rem;
}

/* ===== HEADER (CURRENT DIRECTORY) ===== */
header {
  font-size: 24px;
}

/* ===== BUTTONS ===== */
button {
  background: #111;
  color: white;
  border: 1px solid #333;
  padding: 0.5rem;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
}

button:hover {
  background: #222;
}

</style>
</head>

<body>

<div class="panel">
  <header>Site Ayarları</header>

  <form id="ayarForm">

    <p>Site favicon (yükle):</p>
    <input type="file" id="favicon">

    <p>Site sekme adı:</p>
    <input type="text" id="tabName" placeholder="Örn: Benim Sitem">

    <p>Site başlığı:</p>
    <input type="text" id="title">

    <p>Açıklama:</p>
    <textarea id="desc" rows="3"></textarea>

    <p>Arka plan görsel URL:</p>
    <input type="text" id="bg">

    <p>Metin rengi:</p>
    <input type="color" id="textColor">

    <p>Buton rengi:</p>
    <input type="color" id="btnColor">

    <p>Iframe URL:</p>
    <input type="text" id="iframeURL">

    <p>Iframe yüksekliği:</p>
    <input type="text" id="iframeHeight" placeholder="örn: 50rem">

    <br><br>

    <button type="button" onclick="kaydet()">Kaydet</button>
    <button type="button" onclick="sifirla()">Sıfırla</button>

  </form>
</div>

<script>
// SAVE SETTINGS
function kaydet() {
  const data = {
    tabName: document.getElementById("tabName").value,
    title: document.getElementById("title").value,
    desc: document.getElementById("desc").value,
    bg: document.getElementById("bg").value,
    textColor: document.getElementById("textColor").value,
    btnColor: document.getElementById("btnColor").value,
    iframeURL: document.getElementById("iframeURL").value,
    iframeHeight: document.getElementById("iframeHeight").value
  };

  localStorage.setItem("siteSettings", JSON.stringify(data));
  alert("Kaydedildi!");
}

// RESET SETTINGS
function sifirla() {
  localStorage.removeItem("siteSettings");
  alert("Tüm ayarlar sıfırlandı!");
  location.reload();
}

// LOAD SETTINGS (on page load)
window.onload = function() {
  const data = JSON.parse(localStorage.getItem("siteSettings"));
  if (!data) return;

  document.getElementById("tabName").value = data.tabName || "";
  document.getElementById("title").value = data.title || "";
  document.getElementById("desc").value = data.desc || "";
  document.getElementById("bg").value = data.bg || "";
  document.getElementById("textColor").value = data.textColor || "#ffffff";
  document.getElementById("btnColor").value = data.btnColor || "#111111";
  document.getElementById("iframeURL").value = data.iframeURL || "";
  document.getElementById("iframeHeight").value = data.iframeHeight || "";
};
</script>

</body>
</html>
